<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
  color: white;
}

.page {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  position: absolute;
  top: 0;
  left: 0;
  transition: opacity 1.5s ease;
}

.start-page {
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  text-align: center;
  z-index: 2;
}

.start-page h1 {
  font-size: 4rem;
  text-shadow: 0 0 20px rgba(255,255,255,0.8);
  animation: glow 2s infinite alternate;
}

.start-page p {
  margin-top: 20px;
  font-size: 1.4rem;
  opacity: 0.9;
}

.btn {
  margin-top: 30px;
  padding: 15px 35px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4f81;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

.video-page {
  background: radial-gradient(circle, #ff9a9e, #f6416c);
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  padding: 20px;
}

.video-page.active {
  opacity: 1;
  pointer-events: all;
  z-index: 3;
}

.video-page h2 {
  font-size: 2.8rem;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(255,255,255,0.7);
  text-align: center;
}

video {
  width: min(90vw, 800px);
  max-height: 70vh;
  border-radius: 25px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.35);
}

.floating {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: floatUp 10s linear infinite;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff, 0 0 20px #ffb6c1; }
  to { text-shadow: 0 0 20px #fff, 0 0 40px #ff69b4; }
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  20% { opacity: 1; }
  to {
    transform: translateY(-10vh) scale(1.4);
    opacity: 0;
  }
}

  </style>
</head>
<body>  <audio id="bgMusic" loop>
    <source src="audio1.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>  <div class="page start-page" id="startPage">
    <h1>🎉 Happy Birthday 🎂</h1>
    <p>A special surprise is waiting for you...</p>
    <button class="btn" onclick="startCelebration()">Open Surprise ✨</button>
  </div>  <div class="page video-page" id="videoPage">
    <h2>Make a Wish & Blow the Candle 🕯️</h2>
    <video controls autoplay>
      <source src="video1.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
  </div>  <script>
    function startCelebration() {
      document.getElementById('startPage').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('startPage').style.display = 'none';
        document.getElementById('videoPage').classList.add('active');
      }, 1200);

      const music = document.getElementById('bgMusic');
      music.play().catch(() => {
        console.log('Autoplay blocked until user interaction.');
      });
    }

    for (let i = 0; i < 30; i++) {
      const bubble = document.createElement('div');
      bubble.classList.add('floating');
      bubble.style.left = Math.random() * 100 + 'vw';
      bubble.style.animationDuration = (6 + Math.random() * 6) + 's';
      bubble.style.animationDelay = Math.random() * 5 + 's';
      bubble.style.width = bubble.style.height = (10 + Math.random() * 20) + 'px';
      document.body.appendChild(bubble);
    }
  </script></body>
</html>
